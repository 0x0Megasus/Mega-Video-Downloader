<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mega Video Downloader | Download Videos from Any Platform</title>

  <!-- SEO meta -->
  <meta name="description" content="Mega Video Downloader allows you to download videos from any platform quickly and easily. Paste the video URL and get your video instantly. Works with YouTube, Pinterest, Instagram, TikTok, Facebook, and more." />
  <meta name="keywords" content="video downloader, download videos, YouTube, Instagram, TikTok, Pinterest, Facebook, free video download, Mega Video Downloader" />

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Saira:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Saira", sans-serif; }
    body { height: 100vh; display: flex; justify-content: center; align-items: center; background: #0a0a0a; color: #fff; }
    .container { background: rgba(255,255,255,0.03); border: 1px solid #222; border-radius: 2px; padding: 25px; width: 90%; max-width: 420px; text-align: center; }
    h1 { font-size: 22px; margin-bottom: 10px; }
    p { font-size: 13px; color: #aaa; margin-bottom: 10px; }
    .note { font-size: 12px; color: #ccc; margin-bottom: 15px; }
    input { width: 100%; padding: 10px; border-radius: 2px; border: 1px solid #444; background: transparent; color: #fff; margin-bottom: 10px; outline: none; }
    input:focus { border-color: #fff; }
    button { width: 100%; padding: 10px; border-radius: 2px; border: 1px solid #fff; background: #fff; color: #000; cursor: pointer; font-weight: 600; }
    button:hover { background: #ddd; }
    .progress-bar { margin-top: 15px; height: 6px; background: #222; border-radius: 2px; overflow: hidden; display: none; }
    .progress { height: 100%; width: 0%; background: #fff; }
    .status { margin-top: 10px; font-size: 12px; color: #aaa; }
    @media (max-width: 500px) { .container { padding: 20px; } h1 { font-size: 18px; } }
  </style>
</head>

<body>
<div class="container">
  <h1>Mega Video Downloader</h1>
  <p>Download videos from any platform — YouTube, Instagram, TikTok, Pinterest, Facebook, and more.</p>
  <div class="note">⚠️ Paste the video URL above. Works instantly for any public video.</div>

  <input id="url" placeholder="Enter video URL..." />
  <button onclick="download()">Download</button>

  <div class="progress-bar" id="bar">
    <div class="progress" id="progress"></div>
  </div>

  <div class="status" id="status"></div>
</div>

<script>
const ws = new WebSocket(`ws://${location.host}`);
const progressBar = document.getElementById("bar");
const progress = document.getElementById("progress");
const status = document.getElementById("status");

ws.onmessage = (msg) => {
  const data = JSON.parse(msg.data);
  if (data.progress !== undefined) {
    progressBar.style.display = "block";
    progress.style.width = data.progress + "%";
    status.innerText = "Downloading: " + data.progress + "%";
    if (data.progress >= 100) setTimeout(() => { progressBar.style.display = "none"; progress.style.width = "0%"; }, 500);
  }
};

async function download() {
  const url = document.getElementById("url").value;
  if (!url) { status.innerText = "Enter a URL"; return; }
  status.innerText = "Processing...";
  progressBar.style.display = "block"; progress.style.width = "5%";

  try {
    const res = await fetch("/download", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ url })
    });
    if (!res.ok) throw new Error();
    const blob = await res.blob();
    progress.style.width = "100%";
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "video.mp4";
    link.click();
    status.innerText = "Done ✅";
    setTimeout(() => { progressBar.style.display = "none"; progress.style.width = "0%"; }, 500);
  } catch {
    progress.style.width = "0%"; progressBar.style.display = "none"; status.innerText = "Error ❌";
  }
}
</script>
</body>
</html>
