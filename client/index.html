<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Downvid | Free Video, Image & Music Downloader (No Login)</title>
  <meta name="description" content="Downvid is a free no-login downloader for videos, images and music. Download from TikTok, Instagram, YouTube, Pinterest, Facebook, X, and more. Search songs by title or artist.">
  <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="site-url" content="https://www.downvid.online">

  <link rel="canonical" href="https://www.downvid.online/">
  <link rel="alternate" hreflang="en" href="https://www.downvid.online/">
  <link rel="alternate" hreflang="x-default" href="https://www.downvid.online/">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="/og-image.jpg">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Downvid">
  <meta property="og:title" content="Downvid | Free Video, Image & Music Downloader">
  <meta property="og:description" content="Download videos, images and songs for free with no login. Fast search, instant suggestions and one-click downloads.">
  <meta property="og:url" content="https://www.downvid.online/">
  <meta property="og:image" content="https://www.downvid.online/og-image.jpg">
  <meta property="og:image:alt" content="Downvid logo">
  <meta property="og:locale" content="en_US">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Downvid | Free No-Login Downloader">
  <meta name="twitter:description" content="Free downloader for videos, images and music with no login.">
  <meta name="twitter:image" content="https://www.downvid.online/og-image.jpg">
  <meta name="twitter:url" content="https://www.downvid.online/">

  <meta name="google-site-verification" content="q5V-_QrDrd38a9qT7-K_q5yx0npviRAPyMPV8eDU23s">
  <meta name="pinterest-rich-pin" content="false">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script id="structured-data" type="application/ld+json"></script>
  <script>
    (() => {
      const siteUrlMeta = document.querySelector('meta[name="site-url"]');
      const configuredSiteUrl = siteUrlMeta?.content?.trim() || "";
      const baseUrl = configuredSiteUrl
        ? (/^https?:\/\//i.test(configuredSiteUrl) ? configuredSiteUrl : `https://${configuredSiteUrl}`)
        : window.location.origin;
      const canonicalUrl = new URL(window.location.pathname || "/", baseUrl).toString();
      const imageUrl = new URL("/og-image.jpg", baseUrl).toString();

      const canonical = document.querySelector('link[rel="canonical"]');
      if (canonical) canonical.setAttribute("href", canonicalUrl);

      const ogUrl = document.querySelector('meta[property="og:url"]');
      if (ogUrl) ogUrl.setAttribute("content", canonicalUrl);

      const ogImage = document.querySelector('meta[property="og:image"]');
      if (ogImage) ogImage.setAttribute("content", imageUrl);

      const twitterImage = document.querySelector('meta[name="twitter:image"]');
      if (twitterImage) twitterImage.setAttribute("content", imageUrl);

      const structuredDataScript = document.getElementById("structured-data");
      if (!structuredDataScript) return;

      structuredDataScript.textContent = JSON.stringify([
        {
          "@context": "https://schema.org",
          "@type": "WebSite",
          "name": "Downvid",
          "url": baseUrl
        },
        {
          "@context": "https://schema.org",
          "@type": "WebApplication",
          "name": "Downvid",
          "url": canonicalUrl,
          "applicationCategory": "MultimediaApplication",
          "operatingSystem": "Web",
          "description": "Free no-login downloader for videos, images and music.",
          "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
          "featureList": [
            "No login required",
            "Music search by title or artist",
            "Video and image download support",
            "Fast download flow"
          ]
        },
        {
          "@context": "https://schema.org",
          "@type": "FAQPage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "Do I need an account to use Downvid?",
              "acceptedAnswer": { "@type": "Answer", "text": "No. Downvid is free to use with no login required." }
            },
            {
              "@type": "Question",
              "name": "Can I search songs by artist name?",
              "acceptedAnswer": { "@type": "Answer", "text": "Yes. Search by song title or artist name, then pick from suggestions." }
            },
            {
              "@type": "Question",
              "name": "What can I download?",
              "acceptedAnswer": { "@type": "Answer", "text": "Videos, images and music files from supported platforms." }
            }
          ]
        }
      ]);
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <noscript>
    <main>
      <h1>Downvid</h1>
      <p>Free no-login tool to download videos, images and music online.</p>
      <p>Search songs by title or artist and download from supported platforms.</p>
    </main>
  </noscript>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
